    <!-- Open Graph / social -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preconnect to Google Fonts so the eventual font fetch is faster. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the hero logo (LCP candidate) so the browser starts the
         download in parallel with the JS bundle instead of waiting for
         App.svelte to render. fetchpriority=high signals it's critical. -->
    <link
      rel="preload"
      as="image"
      href="/SubVysionLogoFullWhite.webp"
      type="image/webp"
      fetchpriority="high"
    />

    <!-- Non-render-blocking Google Fonts: swap the rel after load so the
         browser can paint the page with the fallback font immediately,
         then upgrade to Noto Sans when the file arrives. The <noscript>
         path keeps it working with JS disabled. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      />
    </noscript>

    <link rel="stylesheet" crossorigin href="/assets/index-DaJ6qG42.css">
  </head>
